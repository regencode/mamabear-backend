$kind: http-request
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "user@email.com",
      "password": "password123",
      "name": "Siti Rahayu",
      "phone": "081234567890",
      "role": "USER",
      "isVerified": false
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201 or 200", function () {
        pm.response.to.have.status.oneOf([200, 201]);
      });

      const json = pm.response.json();
      if (json && (json.id || json.userId)) {
        pm.environment.set("createdUserId", json.id || json.userId);
      }
    language: text/javascript
order: 1000
