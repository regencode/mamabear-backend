$kind: http-request
url: "{{baseUrl}}/products"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Baby Carrier",
      "description": "Ergonomic baby carrier",
      "weight_g": 500,
      "price_idr": 185000,
      "stock": 10,
      "isActive": true,
      "sku": "BC-001"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201 or 200", function () {
        pm.response.to.have.status.oneOf([200, 201]);
      });

      const json = pm.response.json();
      if (json && (json.id || json.productId)) {
        pm.environment.set("createdProductId", json.id || json.productId);
      }
    language: text/javascript
order: 3000
