$kind: http-request
url: "{{baseUrl}}/auth/reset-password/{{resetToken}}"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  token: "{{resetToken}}"
body:
  type: json
  content: |-
    {
      "password": "newpassword123"
    }
scripts:
  - type: afterResponse
    code: |-
      // --- Success ---
      pm.test("Status is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Response has a message", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("message").that.is.a("string").and.not.empty;
      });

      // --- Failure ---
      pm.test("No error field on success", function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property("error");
      });

      // --- Cleanup ---
      pm.environment.unset("resetToken");
    language: text/javascript
order: 6000
