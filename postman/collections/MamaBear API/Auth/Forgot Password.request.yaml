$kind: http-request
url: "{{baseUrl}}/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "user@email.com"
    }
scripts:
  - type: afterResponse
    code: |-
      // --- Success ---
      pm.test("Status is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Response has a message", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("message").that.is.a("string").and.not.empty;
      });

      // --- Capture resetToken if returned ---
      const json = pm.response.json();
      if (json.resetToken) {
        pm.environment.set("resetToken", json.resetToken);
      }

      // --- Failure ---
      pm.test("No error field on success", function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property("error");
      });
    language: text/javascript
order: 5000
