name: ci

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    timeout-minutes: 5
    env:
      NODE_ENV: ci
      RUNNER_OS: Linux
      PGHOST: localhost
      PGDATABASE: mamabear
      PGUSERNAME: regencode
      PGPASSWORD: pgpasswordregencode
      CORS_ORIGIN: "*"
      JWT_SECRET_KEY: blablablablablabla
    steps:
    - name: Add PostgreSQL binaries to PATH
      shell: bash
      run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$PGBIN" >> $GITHUB_PATH
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "$(pg_config --bindir)" >> $GITHUB_PATH
          fi
    - name: Initialize and start PostgreSQL
      shell: bash
      run: |
        echo "initializing database cluster..."

        # convert backslashes to forward slashes in runner_temp for windows git bash
        export runner_temp="/tmp"
        export pghost="${runner_temp//\\//}/postgres"
        export pgdata="$pghost/pgdata"
        mkdir -p "$pgdata"

        # initdb requires file for password in non-interactive mode
        export pwfile="$runner_temp/pwfile"
        echo "postgres" > "$pwfile"
        initdb --pgdata="$pgdata" --username="postgres" --pwfile="$pwfile"

        echo "starting postgresql..."
        echo "unix_socket_directories = '$pghost'" >> "$pgdata/postgresql.conf"
        pg_ctl -D $pgdata start

        echo "creating user..."
        psql --host "$pghost" --username="postgres" --dbname="postgres" --command="create user $PGUSERNAME password '$PGPASSWORD'" --command="\du"

        echo "creating database..."
        createdb --owner="$PGUSERNAME" --username="postgres" "$PGDATABASE"

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: |
        npm install

    - name: Apply migrations and generate Prisma
      run: |
        export DATABASE_URL="postgresql://$PGUSERNAME:$PGPASSWORD@$PGHOST/$PGDATABASE?schema=public"
        npx prisma migrate deploy
        npx prisma generate

    - name: Build NestJS application
      run: |
        npx nest build
        npx nest start
