info:
  name: Logout
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (201)"
    request:
      url: "{{baseUrl}}/api/auth/logout"
      method: POST
    response:
      status: 201
      statusText: "Created"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 201,
            "message": [
              "No message specified"
            ],
            "data": {
              "message": "Logout success"
            },
            "timestamp": "2026-05-16T09:43:11.895Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/auth/logout"
      method: POST
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.056Z"
          }
