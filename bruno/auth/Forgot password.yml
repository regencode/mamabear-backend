info:
  name: Forgot password
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email": "user@email.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success (200)
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "user@email.com"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": ["OK"],
            "data": "Check your email to reset password",
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
  - name: Email Not Found (400)
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "nonexistent@email.com"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": ["User not found"],
            "data": null,
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
  - name: Validation Error (400)
    request:
      url: "{{baseUrl}}/api/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "not-an-email"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": ["email must be an email"],
            "data": null,
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
