info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@mamabear.id",
        "password": "admin"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.deleteVar('phase');
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('jwtToken', body.data.accessToken || '');
          bru.setVar('refreshToken', body.data.refreshToken || '');
        }
        bru.setNextRequest('Get products (Pagination)');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (201)"
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "admin@mamabear.id",
            "password": "admin"
          }
    response:
      status: 201
      statusText: "Created"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 201,
            "message": [
