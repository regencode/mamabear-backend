info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@mamabear.id",
        "password": "admin"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('jwtToken', body.data.accessToken || '');
          bru.setVar('refreshToken', body.data.refreshToken || '');
        }
        bru.setNextRequest('Get products (Pagination)');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
