info:
  name: Reset password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/auth/reset-password/{{token}}"
  auth: inherit

body:
  json: |
    {
      "password": "newpassword123"
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  variables:
    - name: token
      value: reset-token-here

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
