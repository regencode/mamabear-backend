info:
  name: Reset password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/auth/reset-password/{{token}}"
  body:
    type: json
    data: |-
      {
        "password": "newPassword123"
      }
  auth: inherit

runtime:
  variables:
    - name: token
      value: reset-token-here

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success (200)
    request:
      url: "{{baseUrl}}/api/auth/reset-password/valid-token"
      method: POST
      body:
        type: json
        data: |-
          {
            "password": "newPassword123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": ["OK"],
            "data": "Password reset success",
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
  - name: Token Expired (400)
    request:
      url: "{{baseUrl}}/api/auth/reset-password/expired-token"
      method: POST
      body:
        type: json
        data: |-
          {
            "password": "newPassword123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": ["Reset token expired"],
            "data": null,
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
