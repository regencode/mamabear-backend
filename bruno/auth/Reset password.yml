info:
  name: Reset password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/auth/reset-password/{{token}}"
  body:
    type: json
    data: |-
      {
        "password": "newPassword123"
      }
  auth: inherit

runtime:
  variables:
    - name: token
      value: reset-token-here

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
