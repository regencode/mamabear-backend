info:
  name: Register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/auth/register"
  auth: inherit

body:
  json: |
    {
      "email": "user@email.com",
      "password": "password123",
      "name": "Siti Rahayu",
      "phone": "081234567890"
    }

headers:
  - name: Content-Type
    value: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
