info:
  name: Refresh token
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/refresh"
  auth: inherit

body:
  json: |
    {
      "refreshToken": "{{refreshToken}}"
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('jwtToken', body.data.accessToken || '');
          bru.setVar('refreshToken', body.data.refreshToken || '');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
