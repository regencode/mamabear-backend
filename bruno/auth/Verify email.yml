info:
  name: Verify email
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/auth/verify-email/{{token}}"
  auth: inherit

runtime:
  variables:
    - name: token
      value: verify-token-here

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success (200)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": ["OK"],
            "data": "Email verified successfully",
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
  - name: Token Expired (400)
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": ["Token expired"],
            "data": null,
            "timestamp": "2026-01-01T00:00:00.000Z"
          }
