info:
  name: Update variant
  type: http
  seq: 1

http:
  method: PUT
  url: "{{baseUrl}}/api/products/variants/{{variantId}}"
  body:
    type: json
    data: |-
      {
        "name": "S-26 Procal Gold 3 - 900g (Updated)",
        "priceIdr": 195000,
        "stock": 75
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Upvote review');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/products/variants/7"
      method: PUT
      body:
        type: json
        data: |-
          {
            "name": "Updated Test Variant",
            "priceIdr": 55000,
            "stock": 60
          }
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": [
              "Variant updated successfully"
            ],
            "data": {
              "id": 7,
              "productId": 6,
              "name": "Updated Test Variant",
              "priceIdr": "55000",
              "weightG": 100,
              "sku": "UPDATED-TEST-CAPTURE-PRODUCT-UPDATED-TEST-VARIANT",
              "stock": 60,
              "sortOrder": 0,
              "createdAt": "2026-05-16T09:43:11.717Z",
              "updatedAt": "2026-05-16T09:43:11.785Z"
            },
            "timestamp": "2026-05-16T09:43:11.788Z"
          }
  - name: "Not Found (400)"
    request:
      url: "{{baseUrl}}/api/products/variants/999999"
      method: PUT
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 400
      statusText: "Bad Request"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": [
              "Variant not found"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.275Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/products/variants/1"
      method: PUT
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.276Z"
          }
