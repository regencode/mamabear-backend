info:
  name: Get highlight
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/highlights/{{highlightId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const phase = bru.getVar('phase');
        if (phase === 'read-created') {
          bru.setNextRequest('Update product');
        } else {
          bru.setNextRequest('Get product variants (Admin)');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

