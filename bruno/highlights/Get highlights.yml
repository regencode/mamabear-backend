info:
  name: Get highlights
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/highlights"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data && body.data.length > 0) {
          bru.setVar('highlightId', body.data[0].id || '');
        }
        bru.setNextRequest('Get users');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/highlights"
      method: GET
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
