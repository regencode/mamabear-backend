info:
  name: Create highlight
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/highlights"
  auth:
    type: bearer
    token: "{{jwtToken}}"

body:
  json: |
    {
      "name": "Best Seller",
      "description": "Products that are our best sellers",
      "isActive": true
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('highlightId', body.data.id || '');
        }
        bru.setNextRequest('Create user');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
