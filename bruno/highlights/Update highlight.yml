info:
  name: Update highlight
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/highlights/{{highlightId}}"
  auth:
    type: bearer
    token: "{{jwtToken}}"

body:
  json: |
    {
      "name": "Updated Highlight"
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update user');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
