info:
  name: Update highlight
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/highlights/{{highlightId}}"
  body:
    type: json
    data: |-
      {
        "name": "Best Seller (Updated)",
        "description": "Updated best sellers description",
        "slug": "best-seller-updated-v2"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update user');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/highlights/3"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Updated Test Highlight",
            "description": "Updated description",
            "slug": "test-highlight-updated"
          }
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": [
              "Highlight updated-test-highlight updated successfully"
            ],
            "data": {
              "id": 3,
              "name": "Updated Test Highlight",
              "slug": "updated-test-highlight",
              "description": "Updated description",
              "isActive": true,
              "products": []
            },
            "timestamp": "2026-05-16T09:43:11.773Z"
          }
  - name: "Not Found (400)"
    request:
      url: "{{baseUrl}}/api/highlights/999999"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 400
      statusText: "Bad Request"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": [
              "Highlight not found"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.225Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/highlights/1"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.227Z"
          }
