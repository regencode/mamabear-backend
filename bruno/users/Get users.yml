info:
  name: Get users
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/users"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data && body.data.length > 0) {
          bru.setVar('userId', body.data[0].id || '');
        }
        const phase = bru.getVar('phase');
        if (phase === 'read-created') {
          bru.setNextRequest('Get highlight');
        } else {
          bru.setNextRequest('Get one product');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
