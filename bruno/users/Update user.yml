info:
  name: Update user
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/users/{{userId}}"
  body:
    type: json
    data: |-
      {
        "name": "John Doe (Updated)"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update variant');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/users/fbf8fb32-effd-4374-8689-a3d598540aa1"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Updated Capture User"
          }
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": [
              "User updated successfully"
            ],
            "data": {
              "id": "fbf8fb32-effd-4374-8689-a3d598540aa1",
              "email": "test-capture@example.com",
              "name": "Updated Capture User",
              "phone": "081234567890",
              "role": "USER",
              "isVerified": false,
              "createdAt": "2026-05-16T09:43:11.701Z",
              "updatedAt": "2026-05-16T09:43:11.776Z"
            },
            "timestamp": "2026-05-16T09:43:11.780Z"
          }
  - name: "Not Found (500)"
    request:
      url: "{{baseUrl}}/api/users/00000000-0000-0000-0000-000000000000"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 500
      statusText: "Internal Server Error"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 500,
            "message": [
              "Internal server error"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.258Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/users/42bf8a9e-9e84-4e55-8bbb-a4c20e4769e8"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.260Z"
          }
