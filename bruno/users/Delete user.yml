info:
  name: Delete user
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}/api/users/{{userId}}"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest(null);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
