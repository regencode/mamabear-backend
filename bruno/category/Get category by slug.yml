info:
  name: Get category by slug
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/categories/{{categorySlug}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Get products by category');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
