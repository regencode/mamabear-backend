info:
  name: Update category
  type: http
  seq: 5

http:
  method: PUT
  url: "{{baseUrl}}/api/categories/{{categoryId}}"
  auth:
    type: bearer
    token: "{{jwtToken}}"

body:
  json: |
    {
      "name": "Updated Category",
      "description": "Updated category description"
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update highlight');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
