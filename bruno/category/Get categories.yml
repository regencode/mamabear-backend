info:
  name: Get categories
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/categories"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data && body.data.length > 0) {
          bru.setVar('categorySlug', body.data[0].slug || '');
          bru.setVar('categoryId', body.data[0].id || '');
        }
        bru.setNextRequest('Get highlights');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/categories"
      method: GET
    response:
      status: 200
      statusText: "OK"
