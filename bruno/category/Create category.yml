info:
  name: Create category
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/categories"
  body:
    type: json
    data: |-
      {
        "name": "Growing-up Formula",
        "description": "Formula untuk anak usia 1-3 tahun",
        "imageUrl": "https://example.com/images/growing-up-formula.jpg"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('categoryId', body.data.id || '');
          bru.setVar('categorySlug', body.data.slug || '');
        }
        bru.setNextRequest('Create highlight');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
