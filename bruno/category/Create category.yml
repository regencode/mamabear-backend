info:
  name: Create category
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/categories"
  auth:
    type: bearer
    token: "{{jwtToken}}"

body:
  json: |
    {
      "name": "Formula",
      "description": "Baby formula products",
      "imageUrl": "https://example.com/formula-category.jpg"
    }

headers:
  - name: Content-Type
    value: application/json

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('categoryId', body.data.id || '');
          bru.setVar('categorySlug', body.data.slug || '');
        }
        bru.setNextRequest('Create highlight');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
