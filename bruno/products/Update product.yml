info:
  name: Update product
  type: http
  seq: 10

http:
  method: PUT
  url: "{{baseUrl}}/api/products/{{productId}}"
  body:
    type: json
    data: |-
      {
        "name": "S-26 Procal Gold 3 (Updated)",
        "description": "Updated growing-up formula for children aged 1-3 years.",
        "slug": "s-26-procal-gold-3-updated-v2",
        "priceIdr": 195000,
        "stock": 75
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update category');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/products/6"
      method: PUT
      body:
        type: json
        data: |-
          {
            "name": "Updated Test Capture Product",
            "description": "Updated description",
            "slug": "test-capture-product-updated",
            "priceIdr": 55000,
            "stock": 60
          }
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
