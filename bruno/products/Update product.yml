info:
  name: Update product
  type: http
  seq: 10

http:
  method: PUT
  url: "{{baseUrl}}/api/products/{{productId}}"
  body:
    type: json
    data: |-
      {
        "name": "S-26 Procal Gold 3 (Updated)",
        "description": "Updated growing-up formula for children aged 1-3 years.",
        "priceIdr": 195000,
        "stock": 75
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Update category');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
