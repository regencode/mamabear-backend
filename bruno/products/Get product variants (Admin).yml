info:
  name: Get product variants (Admin)
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/api/products/{{productId}}/variants"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const phase = bru.getVar('phase');
        if (phase === 'read-created') {
          bru.setNextRequest('Get product reviews');
        } else {
          bru.setNextRequest('Get product reviews (Admin)');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/products/1/variants"
      method: GET
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": [
              "Found 1 variants"
            ],
            "data": [
              {
                "id": 1,
                "productId": 1,
                "name": "INTERNAL_DEFAULT",
                "priceIdr": "80000",
                "weightG": 180,
                "sku": "AL.MMBR",
                "stock": 100,
                "sortOrder": 0,
                "createdAt": "2026-05-16T09:43:11.162Z",
                "updatedAt": "2026-05-16T09:43:11.162Z"
              }
            ],
            "timestamp": "2026-05-16T09:43:11.642Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/products/1/variants"
      method: GET
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.066Z"
          }
