info:
  name: Upvote review
  type: http
  seq: 9

http:
  method: PATCH
  url: "{{baseUrl}}/products/{{productSlug}}/reviews/{{reviewId}}/upvote"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Delete product review (Admin)');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
