info:
  name: Upvote review
  type: http
  seq: 9

http:
  method: PATCH
  url: "{{baseUrl}}/products/{{productSlug}}/reviews/{{reviewId}}/upvote"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Delete product review (Admin)');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/products/updated-test-capture-product/reviews/33/upvote"
      method: PATCH
    response:
      status: 200
      statusText: "OK"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 200,
            "message": [
              "Review 33 upvoted successfully"
            ],
            "data": {
              "id": 33,
              "title": "Great product!",
              "reviewerId": "fbf8fb32-effd-4374-8689-a3d598540aa1",
              "productId": 6,
              "rating": 5,
              "numUpvotes": 1,
              "description": "This is a test review from the capture script.",
              "imageUrls": [
                "https://example.com/review-img1.jpg"
              ],
              "createdAt": "2026-05-16T09:43:11.728Z"
            },
            "timestamp": "2026-05-16T09:43:11.794Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/products/mamabear-almonmix-isi-6-sachet/reviews/2/upvote"
      method: PATCH
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.154Z"
          }
  - name: "Not Found (500)"
    request:
      url: "{{baseUrl}}/products/mamabear-almonmix-isi-6-sachet/reviews/999999/upvote"
      method: PATCH
    response:
      status: 500
      statusText: "Internal Server Error"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 500,
            "message": [
              "Internal server error"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.164Z"
          }
