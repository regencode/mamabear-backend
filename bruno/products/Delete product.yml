info:
  name: Delete product
  type: http
  seq: 14

http:
  method: DELETE
  url: "{{baseUrl}}/api/products/{{productId}}"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Delete category');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

