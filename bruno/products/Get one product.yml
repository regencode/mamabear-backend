info:
  name: Get one product
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/products/{{productSlug}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setNextRequest('Get product variants');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
