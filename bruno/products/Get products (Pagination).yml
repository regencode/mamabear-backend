info:
  name: Get products (Pagination)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/products"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data && body.data.data && body.data.data.length > 0) {
          bru.setVar('productSlug', body.data.data[0].slug || '');
          bru.setVar('productId', body.data.data[0].id || '');
        }
        bru.setNextRequest('Get categories');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
