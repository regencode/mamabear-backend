info:
  name: Create variant
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/api/products/{{productId}}/variants"
  body:
    type: json
    data: |-
      {
        "name": "S-26 Procal Gold 3 - 900g",
        "priceIdr": 185000,
        "weightG": 900,
        "sku": "S26-PROCAL-3-900",
        "stock": 50,
        "sortOrder": 0
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data) {
          bru.setVar('variantId', body.data.id || '');
        }
        bru.setNextRequest('Create product review');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (201)"
    request:
      url: "{{baseUrl}}/api/products/6/variants"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Test Capture Variant",
            "priceIdr": 50000,
            "weightG": 100,
            "sku": "TEST.CAPTURE.VAR",
            "stock": 50,
            "sortOrder": 0
          }
    response:
      status: 201
      statusText: "Created"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": true,
            "statusCode": 201,
            "message": [
              "Variant created successfully"
            ],
            "data": {
              "id": 7,
              "productId": 6,
              "name": "Test Capture Variant",
              "priceIdr": "50000",
              "weightG": 100,
              "sku": "TEST.CAPTURE.VAR",
              "stock": 50,
              "sortOrder": 0,
              "createdAt": "2026-05-16T09:43:11.717Z",
              "updatedAt": "2026-05-16T09:43:11.717Z"
            },
            "timestamp": "2026-05-16T09:43:11.721Z"
          }
  - name: "Unauthorized (401)"
    request:
      url: "{{baseUrl}}/api/products/1/variants"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Test"
          }
    response:
      status: 401
      statusText: "Unauthorized"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 401,
            "message": [
              "Unauthorized"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.132Z"
          }
  - name: "Validation Error (400)"
    request:
      url: "{{baseUrl}}/api/products/1/variants"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "priceIdr": "",
            "weightG": ""
          }
    response:
      status: 400
      statusText: "Bad Request"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": [
              "name should not be empty",
              "priceIdr should not be empty",
              "priceIdr must be a number conforming to the specified constraints",
              "weightG should not be empty",
              "weightG must be a number conforming to the specified constraints"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.135Z"
          }
  - name: "Product Not Found (400)"
    request:
      url: "{{baseUrl}}/api/products/999999/variants"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Test Variant",
            "priceIdr": 50000,
            "weightG": 100,
            "sku": "TEST.NOTFOUND",
            "stock": 10,
            "sortOrder": 0
          }
    response:
      status: 400
      statusText: "Bad Request"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": [
              "Product not found"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.139Z"
          }
