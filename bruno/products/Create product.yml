      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "weightG": ""
          }
    response:
      status: 400
      statusText: "Bad Request"
      headers:
        - name: Content-Type
          value: "application/json; charset=utf-8"
      body:
        type: json
        data: |-
          {
            "success": false,
            "statusCode": 400,
            "message": [
              "name should not be empty",
              "description must be a string",
              "ingredients must be a string",
              "usageInstructions must be a string",
              "weightG should not be empty",
              "weightG must be a number conforming to the specified constraints",
              "priceIdr must be a number conforming to the specified constraints"
            ],
            "data": null,
            "timestamp": "2026-05-16T09:43:12.072Z"
          }
