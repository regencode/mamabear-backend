info:
  name: Get product reviews (Admin)
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/api/products/{{productId}}/reviews"
  auth:
    type: bearer
    token: "{{jwtToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const phase = bru.getVar('phase');
        if (phase === 'read-created') {
          bru.setNextRequest('Get category by slug');
        } else {
          bru.setNextRequest('Create product');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Success (200)"
    request:
      url: "{{baseUrl}}/api/products/1/reviews?limit=10&cursor=1"
      method: GET
    response:
