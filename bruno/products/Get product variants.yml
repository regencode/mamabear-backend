info:
  name: Get product variants
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/products/{{productSlug}}/variants"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const phase = bru.getVar('phase');
        if (phase === 'read-created') {
          bru.setNextRequest('Get product variants (Admin)');
        } else {
          bru.setNextRequest('Get product reviews');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
