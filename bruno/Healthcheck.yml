info:
  name: Healthcheck
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
